<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Transportify Voice{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}?v=20260519-tts2" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('pages.home') }}">
                <span class="brand-mark"><i class="bi bi-soundwave"></i></span>
                <span>Transportify Voice</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.home') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.asr_dashboard') }}">ASR Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.tts_dashboard') }}">TTS Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.about_project') }}">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="app-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
            <span>Transportify Voice</span>
            <span>MFCC + SVM Indonesian transportation vocabulary recognition</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=20260519-tts2"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
